<!doctype html>
<!-- Declara que el documento es HTML5 -->

<html lang="es">
  <!-- Idioma del sitio: español -->

  <head>
    <!-- Información del documento (no visible en la página) -->

    <meta charset="UTF-8" />
    <!-- Define la codificación de caracteres para soportar acentos y símbolos -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Hace que la página sea responsiva en móviles y ajuste el tamaño a la pantalla -->

    <meta name="theme-color" content="#2D6A4F" />
    <!-- Define el color de la barra del navegador en móviles -->

    <title>La Esperanza — Productos Agrícolas</title>
    <!-- Título que aparece en la pestaña del navegador -->
  </head>

  <body>
    <!-- Contenido visible de la página -->

    <div id="root"></div>
    <!-- Contenedor principal donde se monta la aplicación (por ejemplo React con main.tsx) -->

    <script type="module" src="/src/main.tsx"></script>
    <!-- Carga el archivo principal de la aplicación usando módulos (probablemente React + TypeScript) -->
  </body>
</html>
